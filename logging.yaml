version: "1"

metadata:
  description: "Enterprise Logging & Security Auditing Configuration"
  domain: "logging_domain"
  level_maturity_target: 3

centralized_log_system:
  target: "Azure Monitor"
  provider: "Log Analytics Workspace"
  ships_to_centralized_system: true
  storage_encrypted: true
  retention_days: 90
  integrity_protection_enabled: true
  alerting_configured: true

  sources:
    - name: frontend-web
      type: application
    - name: auth-service
      type: security
    - name: database
      type: audit
    - name: api-server
      type: application

security_and_integrity:
  encryption:
    enabled: true
    algorithm: AES-256

  retention:
    days: 90

  integrity_protection:
    write_once_read_many: true
    tamper_evident_logging: true
    unauthorized_manipulation_protection: true

correlation_context:
  enabled: true
  correlation_across_sources: true

  headers:
    - correlation_id
    - trace_id
    - x-request-id
    - traceparent

  log_format: "[%(asctime)s] [%(correlation_id)s] [%(levelname)s] %(message)s"

security_event_handlers:
  authentication:
    events:
      - login
      - logout
      - signin
      - signout

  user_lifecycle:
    events:
      - user_created
      - user_deleted
      - user_changed
      - user.updated
      - role_changed

analysis_and_visualization:

  monitoring:
    enabled: true
    provider: Azure Monitor
    real_time_dashboard_available: true
    keyword_search_supported: true
    developer_access_to_app_logs: true

  gui_search:
    enabled: true
    platform: Kibana
    developer_access_policy: ReadOnly

  attack_detection_rules:
    enabled: true
    rules:
      - Brute Force Detection
      - SQL Injection Detection
      - Privilege Escalation
      - Impossible Travel
      - Credential Stuffing

  alerting:
    enabled: true
    provider: PagerDuty

  incident_response:
    enabled: true

  incident_analysis:
    enabled: true
    process: SOC triage and root cause analysis
    root_cause_analysis: true
    post_incident_review: true

  correlated_event_visualizations:
    enabled: true
    dashboards:
      - Azure Workbook
      - Kibana Dashboard
      - Grafana Dashboard

incident_awareness:
  alert_delivery:
    provider: PagerDuty
    channels:
      - Microsoft Teams
      - Slack
      - Email
    severity_threshold: error
